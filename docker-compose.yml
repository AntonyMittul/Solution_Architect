name: aisa

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aisa
      POSTGRES_PASSWORD: aisa
      POSTGRES_DB: aisa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisa -d aisa"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn aisa.platform.app:app --host 0.0.0.0 --port 8000"
    environment: &backend_env
      AISA_ENV: dev
      AISA_DATABASE_URL: postgresql+asyncpg://aisa:aisa@postgres:5432/aisa
      AISA_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m aisa.platform.worker
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./web
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
