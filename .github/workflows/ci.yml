name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aisa
          POSTGRES_PASSWORD: aisa
          POSTGRES_DB: aisa
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aisa -d aisa"
          --health-interval 3s --health-timeout 3s --health-retries 10
    env:
      AISA_DATABASE_URL: postgresql+asyncpg://aisa:aisa@localhost:5432/aisa
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check (strict)
        run: uv run mypy
      - name: Architecture contracts
        run: uv run lint-imports
      - name: Tests
        run: uv run pytest -q
      - name: Migrations up / down / up
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build

  smoke:
    name: Walking-skeleton smoke (compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Build and start stack
        run: docker compose up -d --build --wait postgres redis api worker
      - name: Run smoke test
        working-directory: backend
        run: |
          uv sync --frozen
          uv run python scripts/smoke.py http://localhost:8000
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v
